<!DOCTYPE html>
<html>
<head>
    <title>{{ crop.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Slide animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .title {
            font-size: 40px;
            font-weight: bold;
            color: #2e7d32;
            text-shadow: 1px 1px 2px #ccc;
            animation: fadeIn 1s ease-in-out;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 1.2s ease-in-out;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card p {
            font-size: 17px;
            margin-bottom: 12px;
            animation: slideIn 1s ease;
        }

        .label {
            color: #1b5e20;
            font-weight: bold;
        }

        .back-btn {
            border-radius: 30px;
            padding: 10px 30px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #1b5e20;
            transform: scale(1.1);
        }

        hr {
            border-top: 2px dashed #aaa;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- Title -->
    <h1 class="text-center title">{{ crop.name }} 🌱</h1>

    <!-- Card -->
    <div class="card p-4 mt-4 bg-light">

        <p><span class="label">🌾 Description:</span><br>{{ crop.description }}</p>

        <p><span class="label">💊 Vitamins:</span> {{ crop.vitamins }}</p>

        <p><span class="label">✅ Benefits:</span> {{ crop.benefits }}</p>

        <p><span class="label">🩺 Disease Cure:</span> {{ crop.disease_cure }}</p>

        <hr>

        <p><span class="label">🌿 Fertilizers:</span> {{ crop.fertilizers }}</p>

        <p><span class="label">📊 Expected Yield:</span> {{ crop.expected_yield }}</p>

    </div>

    <!-- Back Button -->
    <div class="text-center mt-4"><button onclick="history.back()" class="btn btn-success back-btn">⬅ Back</button>
    </div>

</div>

</body>
</html>
